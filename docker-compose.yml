version: "3.8"

# Local development dependencies for the Codebase Onboarding Assistant.
# Run:   docker compose up -d
# Stop:  docker compose down
#
# Qdrant dashboard:  http://localhost:6333/dashboard
# Mongo connection:  mongodb://localhost:27017
#
# Notes:
# - In production, swap these out for Qdrant Cloud + MongoDB Atlas.
# - We don't expose Qdrant gRPC (6334) by default — REST on 6333 is what the
#   @qdrant/js-client-rest package uses.

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: coa-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  mongo:
    image: mongo:7
    container_name: coa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_storage:/data/db

volumes:
  qdrant_storage:
  mongo_storage:
